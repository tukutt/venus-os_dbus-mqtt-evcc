; CONFIG FILE
; GitHub repository: https://github.com/tukutt/venus-os_dbus-mqtt-evcc
; remove semicolon ; to enable desired setting

[DEFAULT]
; Set logging level
; ERROR = shows errors only
; WARNING = shows ERROR and warnings
; INFO = shows WARNING and running functions
; DEBUG = shows INFO and data/values
; default: WARNING
logging = WARNING

; Device name shown in the Remote Console and VRM
; default: evcc Charger
device_name = evcc Charger

; Device VRM instance
; default: 11
device_instance = 11

; Wiring of the charger
; 1 = single phase (e.g. Lektrico 1P7K)
; 3 = three phase
; default: 1
phases = 1

; Maximum charging current in ampere, published on /MaxCurrent
; default: 32
max_current = 32

; Watchdog: after how many seconds without any evcc MQTT message the charger
; is forced to Status = Disconnected and Power = 0, so stale values are not kept.
; default: 120
; value to disable watchdog: 0
timeout = 120

; position (connected output/input) of the ev charger
; 0 = AC output
; 1 = AC input
; default: 0
position = 0


[MQTT]
; IP address or FQDN of the MQTT broker (the same broker evcc publishes to)
broker_address = IP_ADDR_OR_FQDN

; Port of the MQTT server
; default plaintext: 1883
; default TLS port: 8883
broker_port = 1883

; Enables TLS
; 0 = Disabled
; 1 = Enabled
;tls_enabled = 1

; Absolute path to the Certificate Authority certificate file that is to be treated as trusted by this client
;tls_path_to_ca = /data/keys/mosquitto.crt

; Disables verification of the server hostname in the server certificate
; 0 = Disabled
; 1 = Enabled
;tls_insecure = 1

; Username used for connection
;username = myuser

; Password used for connection
;password = mypassword

; evcc MQTT topic prefix (the "topic" set in evcc's mqtt config)
; The driver subscribes to <topic_prefix>/loadpoints/<loadpoint_id>/#
; default: evcc
topic_prefix = evcc

; evcc load point id to bridge (1 = first load point)
; default: 1
loadpoint_id = 1
